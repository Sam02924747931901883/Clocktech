<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Clocktech</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clocktech">
<meta name="theme-color" content="#0A0B0D">
<link rel="icon" id="fav-icon" href="">
<link rel="apple-touch-icon" id="touch-icon" href="">
<style>
  :root {
    --bg: #0A0B0D;
    --phone: #141619;
    --card: #1A1D21;
    --card2: #1F2327;
    --border: #262A30;
    --border2: #333940;
    --text: #EDF1F0;
    --muted: #94999D;
    --faint: #5C6266;
    --accent: #9AC2B3;
    --accent-dk: #6E8F80;
    --accent-bg: #1C2925;
    --blue: #7FA8C7;
    --blue-bg: #1B2730;
    --amber: #E3AC5C;
    --amber-bg: #332615;
    --red: #E36A5E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  button, input { font-family: inherit; }
  #app { min-height: 100vh; display: flex; justify-content: center; }
  .phone { width: 100%; max-width: 480px; min-height: 100vh; background: var(--phone); display: flex; flex-direction: column; position: relative; }
  .header { display: flex; justify-content: space-between; align-items: flex-end; padding: calc(20px + env(safe-area-inset-top)) 20px 16px; border-bottom: 1px solid var(--border); }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .logo-img { width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0; display: block; }
  .eyebrow { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px; letter-spacing: 1.5px; color: var(--faint); margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
  .eyebrow svg { width: 10px; height: 10px; }
  .title { font-size: 20px; font-weight: 800; }
  .header-clock { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 15px; color: var(--accent); }
  .main { flex: 1; padding: 18px 16px 104px; overflow-y: auto; }
  .icon { width: 18px; height: 18px; flex-shrink: 0; }
  .section-label { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; letter-spacing: 1.3px; color: var(--faint); text-transform: uppercase; margin-bottom: 10px; }
  .company-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .company-chip { padding: 9px 14px; border-radius: 10px; border: 1.5px solid var(--border2); background: var(--card2); color: var(--muted); font-weight: 600; font-size: 13.5px; cursor: pointer; }
  .company-chip.selected { color: var(--text); }
  .punch-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px 20px 24px; display: flex; flex-direction: column; align-items: center; }
  .active-company-row { display: flex; align-items: center; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
  .dot { width: 8px; height: 8px; border-radius: 99px; flex-shrink: 0; display: inline-block; }
  .active-company-name { font-weight: 700; font-size: 14.5px; }
  .status-pill { font-size: 10px; font-family: ui-monospace, "SF Mono", Menlo, monospace; padding: 3px 8px; border-radius: 99px; letter-spacing: 0.5px; }
  .pill-active { background: var(--accent-bg); color: var(--accent); }
  .pill-break { background: var(--amber-bg); color: var(--amber); }
  .pill-trajet { background: var(--blue-bg); color: var(--blue); }
  .big-timer { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 44px; font-weight: 500; letter-spacing: 1px; }
  .big-timer-label { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: var(--faint); margin-top: 4px; margin-bottom: 24px; }
  .stamp-btn { width: 148px; height: 148px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; box-shadow: 0 8px 0 var(--accent-dk), 0 12px 20px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
  .stamp-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--accent-dk), 0 8px 14px rgba(0,0,0,0.4); }
  .stamp-btn:disabled { opacity: 0.6; }
  .stamp-inner { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--phone); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-weight: 700; font-size: 13px; letter-spacing: 1px; }
  .stamp-inner .icon { width: 26px; height: 26px; }
  .trajet-btn { margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 20px; border-radius: 12px; border: 1.5px solid var(--border2); background: none; color: var(--blue); font-weight: 700; font-size: 13.5px; cursor: pointer; }
  .action-row { display: flex; gap: 12px; width: 100%; }
  .pill-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 0; border-radius: 14px; border: none; font-weight: 700; font-size: 14.5px; cursor: pointer; }
  .pause-btn { background: var(--card2); color: var(--blue); border: 1.5px solid var(--border2); }
  .stop-btn { background: var(--red); color: var(--phone); }
  .loc-row { display: flex; align-items: center; gap: 5px; margin-top: 16px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--faint); }
  .empty-state { display: flex; flex-direction: column; align-items: center; padding: 48px 20px; text-align: center; }
  .empty-state .icon { width: 30px; height: 30px; color: var(--faint); margin-bottom: 12px; }
  .empty-title { font-weight: 700; margin-bottom: 4px; }
  .empty-sub { color: var(--muted); font-size: 14px; }
  .export-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px 0; border-radius: 12px; border: 1.5px solid var(--border2); background: var(--card); color: var(--blue); font-weight: 700; font-size: 14px; cursor: pointer; }
  .export-note { text-align: center; font-size: 11px; color: var(--faint); margin-top: 8px; margin-bottom: 4px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .backup-banner { background: var(--amber-bg); border: 1px solid #4A3420; border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; font-size: 12.5px; color: var(--amber); display: flex; gap: 8px; align-items: flex-start; }
  .backup-banner .icon { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }
  .date-heading { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; letter-spacing: 1.2px; color: var(--faint); text-transform: uppercase; margin: 20px 0 8px; }
  .date-heading:first-of-type { margin-top: 0; }
  .ticket { display: flex; justify-content: space-between; align-items: center; background: var(--card); border: 1px dashed var(--border2); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; gap: 10px; }
  .ticket-left { display: flex; align-items: flex-start; gap: 8px; min-width: 0; }
  .ticket-left .dot { margin-top: 5px; }
  .ticket-company { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .trajet-tag { display: inline-flex; align-items: center; gap: 3px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 9.5px; color: var(--blue); background: var(--blue-bg); padding: 2px 6px; border-radius: 99px; }
  .trajet-tag svg { width: 9px; height: 9px; }
  .ticket-times { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .ticket-loc { display: flex; align-items: center; gap: 4px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10.5px; color: var(--faint); margin-top: 3px; }
  .ticket-loc svg { width: 11px; height: 11px; }
  .ticket-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .ticket-duration { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px; color: var(--accent); }
  .ticket-btns { display: flex; gap: 2px; }
  .icon-btn { background: none; border: none; color: var(--faint); cursor: pointer; padding: 4px; display: flex; }
  .add-form { display: flex; gap: 8px; margin-bottom: 18px; }
  .text-input { flex: 1; background: var(--card); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 14px; outline: none; }
  .add-btn { width: 44px; border-radius: 10px; border: none; background: var(--accent); color: var(--phone); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .company-row { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .company-row-name { font-weight: 700; font-size: 14px; }
  .company-row-count { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--faint); margin-top: 2px; }
  .color-input { width: 26px; height: 26px; border: none; border-radius: 50%; padding: 0; background: none; -webkit-appearance: none; appearance: none; overflow: hidden; cursor: pointer; flex-shrink: 0; }
  .color-input::-webkit-color-swatch-wrapper { padding: 0; }
  .color-input::-webkit-color-swatch { border: 2px solid var(--border2); border-radius: 50%; }
  .week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .week-nav-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border2); background: var(--card); color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .week-nav-label { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .week-range { font-weight: 700; font-size: 15px; }
  .today-btn { background: none; border: none; color: var(--blue); font-size: 11.5px; cursor: pointer; padding: 0; }
  .grand-total-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 22px; }
  .grand-total-label { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; letter-spacing: 1.2px; color: var(--faint); text-transform: uppercase; margin-bottom: 6px; }
  .grand-total-value { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 32px; font-weight: 500; color: var(--accent); }
  .dash-row { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; }
  .dash-row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
  .dash-row-name { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; min-width: 0; }
  .dash-row-name span.label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dash-row-hours { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14px; flex-shrink: 0; }
  .bar-track { height: 6px; border-radius: 99px; background: var(--card2); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; }
  .dash-row-count { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10.5px; color: var(--faint); margin-top: 6px; }
  .trajet-summary-card { background: var(--card); border: 1px dashed var(--border2); border-radius: 12px; padding: 12px 14px; }
  .trajet-summary-total { display: flex; align-items: center; gap: 6px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; color: var(--blue); margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .trajet-summary-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .trajet-summary-name { flex: 1; font-size: 13px; }
  .trajet-summary-hours { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px; color: var(--muted); }
  .nav { position: sticky; bottom: 0; display: flex; border-top: 1px solid var(--border); background: var(--phone); padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 0 14px; background: none; border: none; cursor: pointer; color: var(--faint); }
  .nav-btn.active { color: var(--accent); }
  .nav-label { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px; letter-spacing: 0.4px; }
  .toast { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--card2); color: var(--text); padding: 10px 18px; border-radius: 99px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,0.4); white-space: nowrap; z-index: 10; border: 1px solid var(--border2); }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  .modal-card { background: var(--card); border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 22px 20px calc(22px + env(safe-area-inset-bottom)); width: 100%; max-width: 480px; }
  .modal-title { font-weight: 800; font-size: 17px; margin-bottom: 18px; }
  .field-group { margin-bottom: 16px; }
  .field-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: block; font-family: ui-monospace, "SF Mono", Menlo, monospace; letter-spacing: 0.6px; text-transform: uppercase; }
  .field-input { width: 100%; background: var(--card2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 15px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
  .modal-btn { flex: 1; padding: 13px 0; border-radius: 12px; border: none; font-weight: 700; font-size: 14.5px; cursor: pointer; }
  .modal-btn.cancel { background: var(--card2); color: var(--muted); border: 1px solid var(--border2); }
  .modal-btn.save { background: var(--accent); color: var(--phone); }
  .period-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .period-tab { flex: 1; padding: 8px 0; border-radius: 9px; border: 1px solid var(--border2); background: var(--card2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; }
  .period-tab.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  .event-modal-header { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 17px; margin-bottom: 4px; }
  .event-modal-total { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .event-row { background: var(--card2); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .event-row-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .event-code { font-weight: 700; font-size: 13.5px; }
  .event-hours { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13.5px; color: var(--accent); flex-shrink: 0; }
  .event-venue { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .event-trajet { font-size: 11px; color: var(--blue); margin-top: 2px; }
  .ticket-event { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10.5px; color: var(--muted); margin-top: 3px; }
</style>
</head>

  function loadData() {

  function fmtDuration(ms) {
    if (ms < 0) ms = 0;
    var totalSec = Math.floor(ms / 1000);
    var h = Math.floor(totalSec / 3600);
    var m = Math.floor((totalSec % 3600) / 60);
    var s = totalSec % 60;
    function pad(n) { return String(n).padStart(2, "0"); }
    return pad(h) + ":" + pad(m) + ":" + pad(s);
  }
  function fmtHM(ms) {

    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
  }
  function endOfWeek(date) {
    var s = startOfWeek(date);
    var e = new Date(s);
    e.setDate(e.getDate() + 6);
    e.setHours(23, 59, 59, 999);
    return e;
  }
  function startOfMonth(date) { return new Date(date.getFullYear(), date.getMonth(), 1); }
  function endOfMonth(date) {
    var e = new Date(date.getFullYear(), date.getMonth() + 1, 0);
    e.setHours(23, 59, 59, 999);
    return e;
  }
  var PERIODS = [
    { key: "week", label: "Semaine" },
    { key: "2weeks", label: "2 sem." },
    { key: "3weeks", label: "3 sem." },
    { key: "month", label: "Mois" }
  ];
  function getPeriodRange(period, anchor) {
    if (period === "month") return { start: startOfMonth(anchor), end: endOfMonth(anchor) };
    var weeks = period === "2weeks" ? 2 : period === "3weeks" ? 3 : 1;
    var start = startOfWeek(anchor);
    var end = new Date(start.getTime());
    end.setDate(end.getDate() + weeks * 7 - 1);
    end.setHours(23, 59, 59, 999);
    return { start: start, end: end };
  }
  function shiftPeriod(period, anchor, dir) {
    if (period === "month") {
      var d = new Date(anchor.getTime());
      d.setDate(1);
      d.setMonth(d.getMonth() + dir);
      return d;
    }
    var weeks = period === "2weeks" ? 2 : period === "3weeks" ? 3 : 1;
    return new Date(anchor.getTime() + dir * weeks * 7 * 86400000);
  }
  function periodLabel(period, anchor) {
    var range = getPeriodRange(period, anchor);
    if (period === "month") {
      var s = anchor.toLocaleDateString("fr-CA", { month: "long", year: "numeric" });
      return s.charAt(0).toUpperCase() + s.slice(1);
    }
    return fmtShortDate(range.start) + " – " + fmtShortDate(range.end);
  }
  function periodNoun(period) {
    if (period === "2weeks") return "ces 2 semaines";
    if (period === "3weeks") return "ces 3 semaines";
    if (period === "month") return "ce mois";
    return "cette semaine";
  }
  function isCurrentPeriod(period, anchor) {
    return getPeriodRange(period, anchor).start.getTime() === getPeriodRange(period, new Date()).start.getTime();
  }
  function getActiveShift() { return state.shifts.find(function (s) { return s.status !== "completed"; }); }
  function getLocation() {
    return new Promise(function (resolve) {
      if (!navigator.geolocation) return resolve(null);
      navigator.geolocation.getCurrentPosition(
        function (pos) { resolve({ lat: +pos.coords.latitude.toFixed(2), lng: +pos.coords.longitude.toFixed(2) }); },
        function () { resolve(null); },
        { timeout: 6000, maximumAge: 60000 }
      );
    });
  }

    chevronLeft: ic('<polyline points="15,4 7,12 15,20"/>'),
    chevronRight: ic('<polyline points="9,4 17,12 9,20"/>'),
    download: ic('<path d="M12 3v12"/><polyline points="7,10 12,15 17,10"/><path d="M4 20h16"/>'),
    mapPin: ic('<circle cx="12" cy="10" r="2.7"/><path d="M12 21c4-4.3 7-7.9 7-11a7 7 0 1 0-14 0c0 3.1 3 6.7 7 11z"/>'),
    lock: ic('<rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>'),
    warning: ic('<path d="M12 3l10 18H2z"/><line x1="12" y1="9" x2="12" y2="14"/><line x1="12" y1="17" x2="12" y2="17.01"/>')
  };

  function persist() { saveData(); }

  // ---------- actions ----------
  function setTab(tab) { state.tab = tab; render(); }

  function ensureSelectedCompany() {
    var active = getActiveShift();
    if (active) { state.selectedCompany = active.companyId; return; }
    if (!state.selectedCompany && state.companies.length) state.selectedCompany = state.companies[0].id;
    if (state.selectedCompany && !state.companies.find(function (c) { return c.id === state.selectedCompany; })) {
      state.selectedCompany = state.companies.length ? state.companies[0].id : null;
    }
  }

  function showToast(msg) {
    state.toast = msg;
    render();
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { state.toast = null; render(); }, 2200);
  }

  function addCompany(name) {
    var trimmed = (name || "").trim();
    if (!trimmed) return;
    var color = COMPANY_COLORS[state.companies.length % COMPANY_COLORS.length];
    var c = { id: uid(), name: trimmed, color: color };
    state.companies = state.companies.concat([c]);
    if (!state.selectedCompany) state.selectedCompany = c.id;
    persist();
    showToast(trimmed + " ajoutée");
  }

  function removeCompany(id) {
    var active = getActiveShift();
    if (active && active.companyId === id) { showToast("Termine le quart en cours avant de supprimer"); return; }
    state.companies = state.companies.filter(function (c) { return c.id !== id; });
    if (state.selectedCompany === id) state.selectedCompany = null;
    persist();
    render();
  }

  function changeCompanyColor(id, color) {
    state.companies = state.companies.map(function (c) { return c.id === id ? Object.assign({}, c, { color: color }) : c; });
    persist();
  }

  function punchIn(type) {
    if (!state.selectedCompany) { showToast("Choisis une compagnie d'abord"); return; }
    state.locating = true;
    render();
    getLocation().then(function (loc) {
      state.locating = false;
      var company = state.companies.find(function (c) { return c.id === state.selectedCompany; });
      if (!company) { render(); return; }
      var entry = {
        id: uid(), type: type, companyId: company.id, companyName: company.name,
        startTime: new Date().toISOString(), endTime: null,
        startLocation: loc, endLocation: null, pauses: [], status: "active"
      };
      state.shifts = [entry].concat(state.shifts);
      persist();
      showToast(type === "trajet" ? "Trajet commencé" : (loc ? "Punché — position enregistrée" : "Punché — position indisponible"));
    });
  }

  function punchOut() {
    var active = getActiveShift();
    if (!active) return;
    state.locating = true;
    render();
    getLocation().then(function (loc) {
      state.locating = false;
      state.pendingEnd = { shiftId: active.id, endTime: new Date().toISOString(), endLocation: loc };
      render();
    });
  }

  function cancelCompletion() { state.pendingEnd = null; render(); }

  function confirmCompletion() {
    var pending = state.pendingEnd;
    if (!pending) return;
    var eventInput = document.getElementById("completion-event-input");
    var venueInput = document.getElementById("completion-venue-input");
    var eventVal = (eventInput.value || "").trim();
    var venueVal = (venueInput.value || "").trim();
    if (!eventVal || !venueVal) { showToast("Événement et endroit requis"); return; }
    var s = state.shifts.find(function (x) { return x.id === pending.shiftId; });
    if (!s) { state.pendingEnd = null; render(); return; }
    state.shifts = state.shifts.map(function (x) {
      if (x.id !== s.id) return x;
      return Object.assign({}, x, {
        endTime: pending.endTime,
        endLocation: pending.endLocation,
        status: "completed",
        eventCode: eventVal,
        venue: venueVal,
        pauses: x.pauses.map(function (p) { return p.end ? p : Object.assign({}, p, { end: pending.endTime }); })
      });
    });
    persist();
    state.pendingEnd = null;
    showToast(s.type === "trajet" ? "Trajet terminé" : "Quart terminé");
    render();
  }

  function togglePause() {
    var active = getActiveShift();
    if (!active) return;
    var onBreak = active.status === "onbreak";
    state.shifts = state.shifts.map(function (s) {
      if (s.id !== active.id) return s;
      if (onBreak) {
        var pauses = s.pauses.slice();
        var last = pauses[pauses.length - 1];
        if (last && !last.end) last.end = new Date().toISOString();
        return Object.assign({}, s, { status: "active", pauses: pauses });
      } else {
        return Object.assign({}, s, { status: "onbreak", pauses: s.pauses.concat([{ start: new Date().toISOString(), end: null }]) });
      }
    });
    persist();
    showToast(onBreak ? "Pause terminée" : "Pause commencée");
  }

  function deleteShift(id) {
    state.shifts = state.shifts.filter(function (s) { return s.id !== id; });
    persist();
    render();
  }

  function openEditModal(id) { state.editingId = id; render(); }
  function closeEditModal() { state.editingId = null; render(); }

  function saveEdit() {
    var s = state.shifts.find(function (x) { return x.id === state.editingId; });
    if (!s) { closeEditModal(); return; }
    var startInput = document.getElementById("edit-start-input");
    var endInput = document.getElementById("edit-end-input");
    var eventInput = document.getElementById("edit-event-input");
    var venueInput = document.getElementById("edit-venue-input");
    if (!startInput.value || !endInput.value) { showToast("Remplis les deux dates"); return; }
    var eventVal = (eventInput.value || "").trim();
    var venueVal = (venueInput.value || "").trim();
    if (!eventVal || !venueVal) { showToast("Événement et endroit requis"); return; }
    var newStart = new Date(startInput.value);
    var newEnd = new Date(endInput.value);
    if (newEnd <= newStart) { showToast("La fin doit être après le début"); return; }

    var newPauses = s.pauses;
    if (s.type !== "trajet") {
      var pauseInput = document.getElementById("edit-pause-input");
      var pauseMin = pauseInput ? Math.max(0, parseInt(pauseInput.value, 10) || 0) : 0;
      if (pauseMin > 0) {
        var pStart = new Date(newStart.getTime());
        var pEnd = new Date(pStart.getTime() + pauseMin * 60000);
        newPauses = [{ start: pStart.toISOString(), end: pEnd.toISOString() }];
      } else {
        newPauses = [];
      }
    }
    state.shifts = state.shifts.map(function (x) {
      return x.id === s.id ? Object.assign({}, x, { startTime: newStart.toISOString(), endTime: newEnd.toISOString(), pauses: newPauses, status: "completed", eventCode: eventVal, venue: venueVal }) : x;
    });
    persist();
    state.editingId = null;
    showToast("Modifié");
    render();
  }

  function exportCSV() {
    var rows = [["Type", "Date", "Compagnie", "Événement", "Endroit", "Début", "Fin", "Pause (min)", "Durée", "Lat début", "Lng début", "Lat fin", "Lng fin"]];
    state.shifts
      .filter(function (s) { return s.status === "completed"; })
      .sort(function (a, b) { return new Date(a.startTime) - new Date(b.startTime); })
      .forEach(function (s) {
        rows.push([
          s.type === "trajet" ? "Trajet" : "Travail",
          fmtDate(s.startTime), s.companyName, s.eventCode || "", s.venue || "", fmtTimeShort(s.startTime),
          s.endTime ? fmtTimeShort(s.endTime) : "",
          Math.round(pauseTotalMs(s.pauses) / 60000),
          fmtDuration(shiftWorkedMs(s)),
          s.startLocation ? s.startLocation.lat : "", s.startLocation ? s.startLocation.lng : "",
          s.endLocation ? s.endLocation.lat : "", s.endLocation ? s.endLocation.lng : ""
        ]);
      });
    var csv = rows.map(function (r) { return r.map(function (v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(","); }).join("\n");
    var blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "clocktech-" + new Date().toISOString().slice(0, 10) + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    try { localStorage.setItem(EXPORT_KEY, new Date().toISOString()); } catch (e) {}
    showToast("Export CSV téléchargé");
    render();
  }

  // ---------- render: clock tab ----------
  function renderClockTab() {
    var active = getActiveShift();
    var onBreak = active && active.status === "onbreak";
    var isTrajet = active && active.type === "trajet";
    var elapsed = active ? shiftWorkedMs(Object.assign({}, active, { endTime: null })) : 0;

    if (!state.companies.length) {
      return '<div class="empty-state">' + ICONS.building +
        '<div class="empty-title">Aucune compagnie</div>' +
        '<div class="empty-sub">Ajoute une compagnie dans l\u2019onglet Compagnies pour commencer à punch.</div></div>';

    if (!active) {
      html += '<div class="section-label">Compagnie</div><div class="company-grid">';
      state.companies.forEach(function (c) {
        var sel = state.selectedCompany === c.id;
        var col = colorFor(c.id);
        html += '<button class="company-chip' + (sel ? " selected" : "") + '" data-action="select-company" data-id="' + c.id + '" style="' +
          (sel ? "border-color:" + col + ";background:" + col + "22;" : "") + '">' + escapeHTML(c.name) + "</button>";
      });
      html += "</div>";
    }

    html += '<div class="punch-card">';
    if (active) {
      var pillClass = isTrajet ? "pill-trajet" : (onBreak ? "pill-break" : "pill-active");
      var pillText = isTrajet ? "EN TRAJET" : (onBreak ? "EN PAUSE" : "AU TRAVAIL");
      html += '<div class="active-company-row"><span class="dot" style="background:' + colorFor(active.companyId) + '"></span>' +
        '<span class="active-company-name">' + escapeHTML(active.companyName) + "</span>" +
        '<span class="status-pill ' + pillClass + '">' + pillText + "</span></div>";
    }
    html += '<div class="big-timer" id="big-timer">' + (active ? fmtDuration(elapsed) : "00:00:00") + "</div>";
    html += '<div class="big-timer-label">' + (active ? "débuté à " + fmtTimeShort(active.startTime) : "prêt à punch") + "</div>";

    if (!active) {
      html += '<button class="stamp-btn" data-action="punch-in"' + (state.locating ? " disabled" : "") + ">" +
        '<div class="stamp-inner">' + ICONS.play + "<span>" + (state.locating ? "LOCALISATION…" : "PUNCH") + "</span></div></button>";
      html += '<button class="trajet-btn" data-action="punch-in-trajet"' + (state.locating ? " disabled" : "") + ">" + ICONS.car + " Punch en trajet</button>";
    } else if (isTrajet) {
      html += '<button class="pill-btn stop-btn" style="width:100%" data-action="punch-out"' + (state.locating ? " disabled" : "") + ">" +
        ICONS.square + (state.locating ? " …" : " Terminer le trajet") + "</button>";
    } else {
      html += '<div class="action-row">' +
        '<button class="pill-btn pause-btn" data-action="toggle-pause">' + ICONS.pause + " " + (onBreak ? "Reprendre" : "Pause") + "</button>" +
        '<button class="pill-btn stop-btn" data-action="punch-out"' + (state.locating ? " disabled" : "") + ">" +
        ICONS.square + (state.locating ? " …" : " Terminer") + "</button></div>";
    }
    if (active && active.startLocation) {
      html += '<div class="loc-row">' + ICONS.mapPin + " " + active.startLocation.lat + ", " + active.startLocation.lng + "</div>";
    }
    html += "</div>";
    return html;
  }

  // ---------- render: dashboard tab ----------
  function renderDashboardTab() {
    if (!state.companies.length) {
      return '<div class="empty-state">' + ICONS.calendar + '<div class="empty-sub">Ajoute une compagnie pour voir ton résumé</div></div>';
    }
    var range = getPeriodRange(state.period, state.weekAnchor);
    var start = range.start, end = range.end;
    var inPeriod = state.shifts.filter(function (s) { return s.status === "completed" && new Date(s.startTime) >= start && new Date(s.startTime) <= end; });

    var totals = state.companies.map(function (c) {
      var shifts = inPeriod.filter(function (s) { return s.companyId === c.id && s.type !== "trajet"; });
      return { company: c, ms: shifts.reduce(function (sum, s) { return sum + shiftWorkedMs(s); }, 0), count: shifts.length };
    });
    var trajetTotals = state.companies.map(function (c) {
      var trips = inPeriod.filter(function (s) { return s.companyId === c.id && s.type === "trajet"; });
      return { company: c, ms: trips.reduce(function (sum, s) { return sum + shiftWorkedMs(s); }, 0), count: trips.length };
    }).filter(function (t) { return t.ms > 0; });

    var grandTotal = totals.reduce(function (sum, t) { return sum + t.ms; }, 0);
    var trajetGrandTotal = trajetTotals.reduce(function (sum, t) { return sum + t.ms; }, 0);
    var maxMs = Math.max.apply(null, totals.map(function (t) { return t.ms; }).concat([1]));
    var isCurrent = isCurrentPeriod(state.period, state.weekAnchor);

    var html = '<div class="period-tabs">' + PERIODS.map(function (p) {
      return '<button class="period-tab' + (state.period === p.key ? " active" : "") + '" data-action="set-period" data-period="' + p.key + '">' + p.label + "</button>";
    }).join("") + "</div>";

    html += '<div class="week-nav">' +
      '<button class="week-nav-btn" data-action="week-prev">' + ICONS.chevronLeft + "</button>" +
      '<div class="week-nav-label"><div class="week-range">' + periodLabel(state.period, state.weekAnchor) + "</div>" +
      (isCurrent ? "" : '<button class="today-btn" data-action="week-today">revenir à maintenant</button>') +
      "</div>" +
      '<button class="week-nav-btn" data-action="week-next">' + ICONS.chevronRight + "</button></div>";

    html += '<div class="grand-total-card"><div class="grand-total-label">Total travaillé ' + periodNoun(state.period) + '</div><div class="grand-total-value">' + fmtHM(grandTotal) + "</div></div>";

    html += '<div class="section-label">Par compagnie (touche pour le détail)</div>';
    totals.forEach(function (t) {
      var col = colorFor(t.company.id);
      var pct = (t.ms / maxMs) * 100;
      html += '<div class="dash-row" data-action="view-company" data-id="' + t.company.id + '"><div class="dash-row-top"><div class="dash-row-name"><span class="dot" style="background:' + col + '"></span><span class="label">' +
        escapeHTML(t.company.name) + '</span></div><div class="dash-row-hours">' + fmtHM(t.ms) + "</div></div>" +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + "%;background:" + col + ';"></div></div>' +
        '<div class="dash-row-count">' + t.count + " quart" + (t.count !== 1 ? "s" : "") + "</div></div>";
    });

    if (trajetTotals.length) {
      html += '<div class="section-label" style="margin-top:18px">Trajets (à part)</div><div class="trajet-summary-card">' +
        '<div class="trajet-summary-total">' + ICONS.car + " " + fmtHM(trajetGrandTotal) + " au total</div>";
      trajetTotals.forEach(function (t) {
        html += '<div class="trajet-summary-row"><span class="dot" style="width:7px;height:7px;background:' + colorFor(t.company.id) + '"></span>' +
          '<span class="trajet-summary-name">' + escapeHTML(t.company.name) + '</span><span class="trajet-summary-hours">' + fmtHM(t.ms) + "</span></div>";
      });
      html += "</div>";
    }
    return html;
  }

  // ---------- render: history tab ----------
  function renderHistoryTab() {
    var completed = state.shifts.filter(function (s) { return s.status === "completed"; });
    var html = "";

    var lastExport = null;
    try { lastExport = localStorage.getItem(EXPORT_KEY); } catch (e) {}
    var daysSince = lastExport ? Math.floor((new Date() - new Date(lastExport)) / 86400000) : null;
    if (completed.length && (daysSince === null || daysSince >= 7)) {
      html += '<div class="backup-banner">' + ICONS.warning +
        "<span>" + (daysSince === null ? "Tu n'as jamais exporté tes données. Fais-le régulièrement par mesure de sécurité." :
          "Dernier export il y a " + daysSince + " jours — pense à en refaire un.") + "</span></div>";
    }

    html += '<button class="export-btn" data-action="export-csv"' + (completed.length ? "" : " disabled") + ">" + ICONS.download + " Exporter en CSV</button>";
    if (lastExport && daysSince !== null && daysSince < 7) {
      html += '<div class="export-note">dernier export : il y a ' + daysSince + (daysSince <= 1 ? " jour" : " jours") + "</div>";
    }

    if (!completed.length) {
      html += '<div class="empty-state">' + ICONS.history + '<div class="empty-sub">Aucun quart terminé pour l\u2019instant</div></div>';
      return html;
    }

    var grouped = {};
    var order = [];
    completed.slice().sort(function (a, b) { return new Date(b.startTime) - new Date(a.startTime); }).forEach(function (s) {
      var key = fmtDate(s.startTime);
      if (!grouped[key]) { grouped[key] = []; order.push(key); }
      grouped[key].push(s);
    });

    order.forEach(function (date) {
      html += '<div class="date-heading">' + date + "</div>";
      grouped[date].forEach(function (s) {
        html += '<div class="ticket"><div class="ticket-left"><span class="dot" style="background:' + colorFor(s.companyId) + '"></span><div style="min-width:0">' +
          '<div class="ticket-company">' + escapeHTML(s.companyName) +
          (s.type === "trajet" ? '<span class="trajet-tag">' + ICONS.car + " trajet</span>" : "") + "</div>" +
          '<div class="ticket-times">' + fmtTimeShort(s.startTime) + " → " + (s.endTime ? fmtTimeShort(s.endTime) : "") +
          (s.type !== "trajet" && s.pauses.length ? " · pause " + Math.round(pauseTotalMs(s.pauses) / 60000) + " min" : "") + "</div>";
        if (s.startLocation || s.endLocation) {
          html += '<div class="ticket-loc">' + ICONS.mapPin + " " + (s.startLocation ? s.startLocation.lat + ", " + s.startLocation.lng : "position n/d") + "</div>";
        }
        if (s.eventCode || s.venue) {
          html += '<div class="ticket-event">' + escapeHTML(s.eventCode || "") + (s.eventCode && s.venue ? " · " : "") + escapeHTML(s.venue || "") + "</div>";
        }
        html += "</div></div><div class=\"ticket-right\"><div class=\"ticket-duration\">" + fmtDuration(shiftWorkedMs(s)) + "</div>" +
          '<div class="ticket-btns"><button class="icon-btn" data-action="edit-shift" data-id="' + s.id + '">' + ICONS.edit + "</button>" +
          '<button class="icon-btn" data-action="delete-shift" data-id="' + s.id + '">' + ICONS.trash + "</button></div></div></div>";
      });
    });
    return html;
  }

  // ---------- render: companies tab ----------
  function renderCompaniesTab() {
    var html = '<form class="add-form" id="add-company-form">' +
      '<input class="text-input" name="company-name" placeholder="Nom de la compagnie" autocomplete="off">' +
      '<button type="submit" class="add-btn">' + ICONS.plus + "</button></form>";

    if (!state.companies.length) {
      html += '<div class="empty-state">' + ICONS.building + '<div class="empty-sub">Ajoute ta première compagnie ci-dessus</div></div>';
      return html;
    }

    state.companies.forEach(function (c) {
      var count = state.shifts.filter(function (s) { return s.companyId === c.id && s.status === "completed"; }).length;
      html += '<div class="company-row"><input type="color" class="color-input" data-action="change-color" data-id="' + c.id + '" value="' + colorFor(c.id) + '">' +
        '<div style="flex:1;min-width:0"><div class="company-row-name">' + escapeHTML(c.name) + '</div><div class="company-row-count">' +
        count + " quart" + (count !== 1 ? "s" : "") + " enregistré" + (count !== 1 ? "s" : "") + "</div></div>" +
        '<button class="icon-btn" data-action="remove-company" data-id="' + c.id + '">' + ICONS.x + "</button></div>";
    });
    return html;
  }

  // ---------- render: edit modal ----------
  function renderEditModal() {
    if (!state.editingId) return "";
    var s = state.shifts.find(function (x) { return x.id === state.editingId; });
    if (!s) return "";
    var pauseMin = Math.round(pauseTotalMs(s.pauses) / 60000);
    var html = '<div class="modal-backdrop">' +
      '<div class="modal-card">' +
      '<div class="modal-title">Modifier — ' + escapeHTML(s.companyName) + (s.type === "trajet" ? " (trajet)" : "") + "</div>" +
      '<div class="field-group"><label class="field-label">Début</label><input type="datetime-local" class="field-input" id="edit-start-input" value="' + toLocalInputValue(s.startTime) + '"></div>' +
      '<div class="field-group"><label class="field-label">Fin</label><input type="datetime-local" class="field-input" id="edit-end-input" value="' + toLocalInputValue(s.endTime || new Date().toISOString()) + '"></div>';
    if (s.type !== "trajet") {
      html += '<div class="field-group"><label class="field-label">Pause (minutes)</label><input type="number" min="0" class="field-input" id="edit-pause-input" value="' + pauseMin + '"></div>';
    }
    html += '<div class="field-group"><label class="field-label">Événement</label><input type="text" class="field-input" id="edit-event-input" value="' + escapeHTML(s.eventCode || "") + '" placeholder="ex: lp001" autocomplete="off"></div>' +
      '<div class="field-group"><label class="field-label">Endroit</label><input type="text" class="field-input" id="edit-venue-input" value="' + escapeHTML(s.venue || "") + '" placeholder="ex: Best Western Drummondville" autocomplete="off"></div>';
    html += '<div class="modal-actions"><button class="modal-btn cancel" data-action="close-edit">Annuler</button>' +
      '<button class="modal-btn save" data-action="save-edit">Enregistrer</button></div>' +
      "</div></div>";
    return html;
  }

  // ---------- render: completion modal (punch-out) ----------
  function renderCompletionModal() {
    if (!state.pendingEnd) return "";
    var s = state.shifts.find(function (x) { return x.id === state.pendingEnd.shiftId; });
    if (!s) return "";
    var html = '<div class="modal-backdrop">' +
      '<div class="modal-card">' +
      '<div class="modal-title">Terminer — ' + escapeHTML(s.companyName) + (s.type === "trajet" ? " (trajet)" : "") + "</div>" +
      '<div class="field-group"><label class="field-label">Événement</label><input type="text" class="field-input" id="completion-event-input" placeholder="ex: lp001" autocomplete="off"></div>' +
      '<div class="field-group"><label class="field-label">Endroit</label><input type="text" class="field-input" id="completion-venue-input" placeholder="ex: Best Western Drummondville" autocomplete="off"></div>' +
      '<div class="modal-actions"><button class="modal-btn cancel" data-action="cancel-completion">Annuler</button>' +
      '<button class="modal-btn save" data-action="confirm-completion">Confirmer</button></div>' +
      "</div></div>";
    return html;
  }

  // ---------- render: company event breakdown modal ----------
  function closeCompanyView() { state.viewingCompanyId = null; render(); }

  function renderCompanyEventModal() {
    if (!state.viewingCompanyId) return "";
    var company = state.companies.find(function (c) { return c.id === state.viewingCompanyId; });
    if (!company) return "";
    var range = getPeriodRange(state.period, state.weekAnchor);
    var inPeriod = state.shifts.filter(function (s) {
      return s.status === "completed" && s.companyId === company.id && new Date(s.startTime) >= range.start && new Date(s.startTime) <= range.end;
    });
    var workTotal = inPeriod.filter(function (s) { return s.type !== "trajet"; }).reduce(function (sum, s) { return sum + shiftWorkedMs(s); }, 0);

    var groups = {};
    var order = [];
    inPeriod.forEach(function (s) {
      var key = s.eventCode || "(sans événement)";
      if (!groups[key]) { groups[key] = { venue: "", workMs: 0, trajetMs: 0 }; order.push(key); }
      if (s.type === "trajet") groups[key].trajetMs += shiftWorkedMs(s);
      else groups[key].workMs += shiftWorkedMs(s);
      if (!groups[key].venue && s.venue) groups[key].venue = s.venue;
    });

    var rowsHtml = order.length ? order.map(function (key) {
      var g = groups[key];
      return '<div class="event-row"><div class="event-row-top"><span class="event-code">' + escapeHTML(key) + '</span><span class="event-hours">' + fmtHM(g.workMs) + "</span></div>" +
        (g.venue ? '<div class="event-venue">' + escapeHTML(g.venue) + "</div>" : "") +
        (g.trajetMs ? '<div class="event-trajet">+ ' + fmtHM(g.trajetMs) + " trajet</div>" : "") +
        "</div>";
    }).join("") : '<div class="empty-sub" style="padding:10px 0 4px">Aucun événement pour cette période</div>';

    var html = '<div class="modal-backdrop">' +
      '<div class="modal-card">' +
      '<div class="event-modal-header"><span class="dot" style="background:' + colorFor(company.id) + '"></span>' + escapeHTML(company.name) + "</div>" +
      '<div class="event-modal-total">' + fmtHM(workTotal) + " · " + periodNoun(state.period) + "</div>" +
      rowsHtml +
      '<button class="modal-btn cancel" style="width:100%;margin-top:10px" data-action="close-company-view">Fermer</button>' +
      "</div></div>";
    return html;
  }

  // ---------- master render ----------
  function navBtn(tab, icon, label) {
    var active = state.tab === tab;
    return '<button class="nav-btn' + (active ? " active" : "") + '" data-action="set-tab" data-tab="' + tab + '">' + icon + '<span class="nav-label">' + label + "</span></button>";
  }

  function render() {
    ensureSelectedCompany();
    var tabHtml = state.tab === "clock" ? renderClockTab()
      : state.tab === "dashboard" ? renderDashboardTab()
      : state.tab === "history" ? renderHistoryTab()
      : renderCompaniesTab();

    var html = '<div class="phone">' +
      '<header class="header"><div class="header-brand"><img class="logo-img" src="' + LOGO_URI + '" alt="Clocktech"><div><div class="eyebrow">' + ICONS.lock + ' 100% LOCAL</div><div class="title">Clocktech</div></div></div>' +
      '<div class="header-clock" id="header-clock">' + fmtClock(new Date()) + "</div></header>" +
      '<main class="main">' + tabHtml + "</main>" +
      '<nav class="nav">' +
      navBtn("clock", ICONS.clock, "Horloge") +
      navBtn("dashboard", ICONS.calendar, "Résumé") +
      navBtn("history", ICONS.history, "Historique") +
      navBtn("companies", ICONS.building, "Compagnies") +
      "</nav>" +
      (state.toast ? '<div class="toast">' + escapeHTML(state.toast) + "</div>" : "") +
      "</div>" +
      renderEditModal() +
      renderCompletionModal() +
      renderCompanyEventModal();

    document.getElementById("app").innerHTML = html;
  }

  // ---------- event delegation ----------
  document.addEventListener("DOMContentLoaded", function () {
    var favIcon = document.getElementById("fav-icon");
    if (favIcon) favIcon.href = LOGO_URI;
    var touchIcon = document.getElementById("touch-icon");
    if (touchIcon) touchIcon.href = LOGO_URI;

    var app = document.getElementById("app");

    app.addEventListener("click", function (e) {
      if (e.target.classList.contains("modal-backdrop")) {
        if (state.pendingEnd) cancelCompletion();
        else if (state.editingId) closeEditModal();
        else if (state.viewingCompanyId) closeCompanyView();
        return;
      }
      var btn = e.target.closest("[data-action]");
      if (!btn || btn.disabled) return;
      var action = btn.dataset.action;
      if (action === "set-tab") setTab(btn.dataset.tab);
      else if (action === "select-company") { state.selectedCompany = btn.dataset.id; render(); }
      else if (action === "punch-in") punchIn("work");
      else if (action === "punch-in-trajet") punchIn("trajet");
      else if (action === "punch-out") punchOut();
      else if (action === "toggle-pause") togglePause();
      else if (action === "delete-shift") deleteShift(btn.dataset.id);
      else if (action === "edit-shift") openEditModal(btn.dataset.id);
      else if (action === "close-edit") closeEditModal();
      else if (action === "save-edit") saveEdit();
      else if (action === "confirm-completion") confirmCompletion();
      else if (action === "cancel-completion") cancelCompletion();
      else if (action === "view-company") { state.viewingCompanyId = btn.dataset.id; render(); }
      else if (action === "close-company-view") closeCompanyView();
      else if (action === "remove-company") removeCompany(btn.dataset.id);
      else if (action === "export-csv") exportCSV();
      else if (action === "set-period") { state.period = btn.dataset.period; state.weekAnchor = new Date(); render(); }
      else if (action === "week-prev") { state.weekAnchor = shiftPeriod(state.period, state.weekAnchor, -1); render(); }
      else if (action === "week-next") { state.weekAnchor = shiftPeriod(state.period, state.weekAnchor, 1); render(); }
      else if (action === "week-today") { state.weekAnchor = new Date(); render(); }
    });

    app.addEventListener("submit", function (e) {
      if (e.target.id === "add-company-form") {
        e.preventDefault();
        var input = e.target.querySelector('input[name="company-name"]');
        addCompany(input.value);
        input.value = "";
      }
    });

    app.addEventListener("change", function (e) {
      var el = e.target.closest('[data-action="change-color"]');
      if (!el) return;
      changeCompanyColor(el.dataset.id, el.value);
    });

    render();

    setInterval(function () {
      var clockEl = document.getElementById("header-clock");
      if (clockEl) clockEl.textContent = fmtClock(new Date());
      var active = getActiveShift();
      if (active && state.tab === "clock") {
        var timerEl = document.getElementById("big-timer");
        if (timerEl) timerEl.textContent = fmtDuration(shiftWorkedMs(Object.assign({}, active, { endTime: null })));
      }
    }, 1000);
  });
})();
</script>
</body>
</html>
